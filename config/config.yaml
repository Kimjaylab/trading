# 국내 주식 장중 AI 단타 자동매매 시스템 - 기본 설정
# 모든 값은 실거래 전 반드시 백테스트로 재검증할 것.

# 시장별 세션 시각(모두 한국시간 KST 기준). 여러 마켓을 병행 매매할 수 있도록
# 프로필로 분리했다 - Config(market="US")처럼 선택한다.
# 미국장(US)은 자정을 넘기는 세션이라 시간 계산 로직(utils/time_utils.py)이
# day-rollover를 명시적으로 처리한다: 단순 "ts.time() >= 마감시각" 비교는 여기서 깨진다.
markets:
  KRX:
    timezone: "Asia/Seoul"
    open_time: "09:00"
    close_time: "15:30"
    force_liquidation_time: "15:20"   # 이 시각 이후 신규 진입 금지 + 보유분 정리 시작
    hard_close_time: "15:25"          # 이 시각까지 전량 청산 강제
  US:
    # 미 동부시간 서머타임(EDT, 3월~11월) 09:30~16:00 ET = 22:30~05:00 KST 기준.
    # 표준시(EST) 기간에는 여기서 1시간씩 뒤로(23:30~06:00) 조정해야 한다 - 자동 계산 아님, 수동 확인 필요.
    timezone: "Asia/Seoul"
    open_time: "22:30"
    close_time: "05:00"
    force_liquidation_time: "04:50"
    hard_close_time: "04:55"

# 시가 기준 경과(분)로 전략을 전환한다. 두 마켓 모두 정규장이 6.5시간(390분)으로 동일해
# 아래 phase 경계를 공용으로 사용한다.
phases:
  - name: breakout
    start_offset_min: 0
    end_offset_min: 10
  - name: pullback
    start_offset_min: 10
    end_offset_min: 30
  - name: trend_pullback
    start_offset_min: 30
    end_offset_min: 999   # 장 마감까지

# 매수 제외 하드필터 (스코어링 이전에 적용, 하나라도 걸리면 즉시 제외)
filters:
  min_avg_trading_value_krw: 3_000_000_000   # 최근 20일 평균 거래대금 30억 미만 제외 (유동성)
  min_today_trading_value_krw: 1_000_000_000 # 당일 누적 거래대금 최소치
  max_spread_pct: 0.5                        # 최우선 매도호가/매수호가 스프레드 0.5% 초과 제외
  min_orderbook_depth_krw: 30_000_000        # 상위 5호가 합산 잔량 대금 최소치 (호가 얇음 방지)
  max_overheat_return_pct: 25.0              # 시가 대비 상승률 25% 초과 시 과열로 제외
  max_volatility_atr_pct: 8.0                # ATR/현재가 비율 8% 초과 시 변동성 과다 제외
  min_adx_for_trend: 15                      # ADX 미달 시 추세 없음(횡보)으로 간주해 추세 전략 제외
  news_spike_volume_ratio_threshold: 1.5     # 가격 급등 대비 거래량 배율이 이보다 낮으면 '뉴스성 단독급등'으로 의심 제외
  exclude_flags: ["관리종목", "투자주의", "투자경고", "투자위험", "거래정지", "정리매매"]

risk:
  max_loss_per_trade_pct: 2.5        # 종목당 최대 손실 (계좌 대비 아님, 진입가 대비)
  daily_max_loss_pct: 5.0            # 계좌 기준 일일 최대 손실 도달 시 당일 매매 중단
  max_consecutive_losses: 3          # 연속 손실 시 당일 매매 중단(또는 포지션 사이즈 축소)
  consecutive_loss_size_cutback_pct: 50  # 연속 2회 손실 시 다음 진입 사이즈 축소 비율
  reentry_cooldown_minutes: 30       # 동일 종목 손절 후 재진입 금지 시간
  max_entries_per_5min: 2            # 동일 시간대 과매수 방지 (5분당 신규 진입 최대 건수)
  max_open_positions: 5              # 최대 동시 보유 종목 수
  min_reward_risk_ratio: 1.0         # 기대수익/손절폭 비율이 이보다 낮으면 진입 금지
                                      # (돌파매매가 +3%/-3%로 정확히 1.0이라 이보다 높이면 돌파 진입이 전부 막힘)
  max_position_weight_pct: 20.0      # 종목당 최대 비중 (계좌 대비)

strategies:
  breakout:
    partial_take_profit_pct: 2.0   # 이 수익률에서 절반 익절
    full_take_profit_pct: 3.0      # 이 수익률에서 잔량 전량 익절
    hard_stop_pct: 3.0
    partial_exit_fraction: 0.5      # 부분 익절 시 매도할 비중 (나머지는 전량 익절/손절까지 보유)
    max_hold_minutes: 15
    score_entry_threshold: 0.62
    execution_strength_exit_threshold: 90   # 체결강도 이 값 아래로 급락 시 즉시 청산
  pullback:
    partial_take_profit_pct: 5.0
    full_take_profit_pct: 8.0
    hard_stop_pct: 4.0
    partial_exit_fraction: 0.5
    max_hold_minutes: 60
    score_entry_threshold: 0.58
    pullback_volume_decay_max: 0.6   # 눌림 구간 거래량이 직전 상승구간의 60% 이하여야 '건강한 눌림'
  trend_pullback:
    partial_take_profit_pct: 7.0
    full_take_profit_pct: 10.0
    hard_stop_pct: 4.0
    partial_exit_fraction: 0.5
    score_entry_threshold: 0.55
    force_exit_before_close_minutes: 10
    min_days_uptrend: 1

scoring:
  weights_path: "config/weights.json"
  score_scale: "sigmoid"   # 가중합을 sigmoid로 0~1 확률로 변환

regime:
  index_ma_short: 5
  index_ma_long: 20
  adx_period: 14
  adx_trend_threshold: 20
  # 국면별로 진입 임계값을 가산/감산한다 (하락장에서는 더 엄격하게)
  threshold_adjust:
    bull: -0.03
    sideways: 0.0
    bear: 0.07
